```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ListPages</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<h2>Danh sách nhân viên</h2>

<table id="employeeTable">
    <thead>
        <tr>
            <th>MNV</th>
            <th>HỌ VÀ TÊN</th>
            <th>NGÀY SINH</th>
            <th>CĂN CƯỚC</th>
            <th>ĐIỆN THOẠI</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="detail-panel">

    <div class="photo-panel">
        <img id="photo" src="" alt="No Image">
    </div>

    <div class="info-panel">

        <label>MNV</label>
        <input type="text" id="txtMNV" readonly>

        <label>HỌ VÀ TÊN</label>
        <input type="text" id="txtName" readonly>

        <label>NGÀY SINH</label>
        <input type="text" id="txtBirth" readonly>

        <label>CĂN CƯỚC</label>
        <input type="text" id="txtCCCD" readonly>

        <label>ĐIỆN THOẠI</label>
        <input type="text" id="txtPhone" readonly>

    </div>

</div>

<script>

let employees = [];

loadExcel();

async function loadExcel()
{
    const response = await fetch("dataExcel.xlsx");

    const data = await response.arrayBuffer();

    const workbook = XLSX.read(data);

    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    employees = XLSX.utils.sheet_to_json(sheet);

    buildTable();
}

function buildTable()
{
    const tbody = document.querySelector("#employeeTable tbody");

    employees.forEach(emp =>
    {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${emp["MNV"] || ""}</td>
            <td>${emp["HỌ VÀ TÊN"] || ""}</td>
            <td>${emp["NGÀY SINH"] || ""}</td>
            <td>${emp["CĂN CƯỚC"] || ""}</td>
            <td>${emp["ĐIỆN THOẠI"] || ""}</td>
        `;

        tr.addEventListener("click", () =>
        {
            showEmployee(emp);
        });

        tbody.appendChild(tr);
    });

    if(employees.length > 0)
    {
        showEmployee(employees[0]);
    }
}

function showEmployee(emp)
{
    document.getElementById("txtMNV").value =
        emp["MNV"] || "";

    document.getElementById("txtName").value =
        emp["HỌ VÀ TÊN"] || "";

    document.getElementById("txtBirth").value =
        emp["NGÀY SINH"] || "";

    document.getElementById("txtCCCD").value =
        emp["CĂN CƯỚC"] || "";

    document.getElementById("txtPhone").value =
        emp["ĐIỆN THOẠI"] || "";

    const img =
        "images/" + emp["MNV"] + ".jpg";

    document.getElementById("photo").src = img;
}
</script>

</body>
</html>
```
